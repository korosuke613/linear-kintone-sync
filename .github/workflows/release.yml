name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm OIDC trusted publishing + provenance

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter linear-kintone-sync build

      # Staged publishing requires npm >= 11.15.0.
      - name: Update npm
        run: npm install -g npm@latest

      # Stages the publish via the OIDC trusted publisher (no token, no 2FA).
      # It does NOT go live automatically: a maintainer must approve it on
      # npmjs.com (Staged Packages tab) or via `npm stage approve <id>` (2FA).
      # Configure the trusted publisher on npmjs.com with "Allow npm stage
      # publish": GitHub Actions / korosuke613 / linear-kintone-sync / release.yml
      - name: Stage publish
        run: npm stage publish --provenance --access public
        working-directory: packages/lks-core
